name: Release

on:
  push:
    branches: [main]

# Le DS est consommé en dépendance git (pas d'image Docker, pas de publish npm) :
# release-please ne gère ici que la version + le CHANGELOG.
jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
